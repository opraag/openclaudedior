schema_id: alpana/bubble-pack
schema_version: v0alpha1

id: repo_delivery_default
name: Repo Delivery Default
status: active
bubble_type: repo_delivery

mission: >
  Perform bounded repository work such as documentation rewrites, contract updates,
  CI hardening, and implementation patches while keeping kernel meaning, governance,
  and local delivery concerns distinct.

scope:
  in:
    - read_repository_state
    - rewrite_readme_and_docs
    - update_yaml_contracts
    - patch_source_files_in_scope
    - run_local_checks
    - prepare_patch_bundle
    - summarize_findings_with_provenance
  out:
    - redefine_kernel_primitives
    - alter_constitutional_governance
    - access_or_rotate_secrets
    - production_deployments
    - irreversible_destructive_git_actions
    - silent_scope_expansion
  parent_circle: delivery
  parent_bubble: null
  adjacent_contexts:
    - governance
    - knowledge
    - infrastructure

capabilities:
  visible_tools:
    - filesystem
    - git
    - repo_search
    - diff
    - test_runner
    - markdown_editor
  enabled_tools:
    - read_file
    - write_file
    - search_repo
    - inspect_diff
    - run_tests
    - create_patch_bundle
  skills:
    - repo_reading
    - contract_editing
    - docs_rewriting
    - patch_planning
    - check_interpretation
    - provenance_summary
  local_agents:
    - local_worker
    - scope_manager
    - reviewer
  optional_services:
    - ci_runner
    - issue_tracker
    - pr_context_loader

artifacts:
  produces:
    - patch_bundle
    - updated_docs
    - updated_contracts
    - validation_report
    - pull_request_note
  stores_in:
    - repo_root
    - reports/

retrieval:
  profile_ref: alpana/contracts/retrieval/repo-delivery.retrieval.yaml
  overrides:
    freshness_bias:
      external_docs: latest_stable
    max_results:
      repo_search: 30

governance:
  decision_class_default: local
  nana_default: false
  human_review_default: false
  escalation_triggers:
    - schema_change
    - contract_change
    - ci_workflow_change
    - ownership_change
    - sensitive_permission_need
    - external_side_effect
    - ambiguous_scope_boundary
  inbound_contracts:
    - bubble_accepts_run_manifest
    - bubble_accepts_repo_context
  outbound_contracts:
    - repo_delivery_output_contract
    - escalation_notice_contract

runtime:
  profile_ref: alpana/runtime/profiles/repo-delivery.profile.yaml
  adapter_policy:
    keep_internal_prompt_grammar_stable: true
    provider_specific_logic_at_edge: true
  doctor_required: true

metrics:
  leading:
    - files_scanned_count
    - checks_run_count
    - reversible_change_ratio
    - citation_coverage_ratio
  lagging:
    - checks_passed_rate
    - merge_acceptance_rate
    - rollback_rate
    - rework_rate
  health:
    - scope_breach_count
    - unresolved_failures_count
    - escalation_count

memory:
  local_memory:
    enabled: true
    scope: bubble_only
  promote_to:
    - domain_reusable
  retention:
    successful_runs: 30d
    failed_runs: 14d
    promoted_patterns: permanent_until_review

interfaces:
  inputs:
    - run_manifest
    - repo_context
    - target_paths
    - acceptance_criteria
  outputs:
    - patch_bundle
    - updated_files
    - validation_report
    - escalation_request
  adjacent_bubbles:
    - governance.review
    - knowledge.reference
    - infrastructure.ci

notes:
  doctrine:
    - keep_core_prompt_small
    - place_behavior_in_profiles_contracts_and_checks
    - do_not_promote_local_truth_without_governance
